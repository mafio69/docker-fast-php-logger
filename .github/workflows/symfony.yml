name: Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  symfony-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'

    - uses: actions/checkout@v4

    - name: Install time-agent dependencies
      run: composer install --no-interaction --no-progress --prefer-dist -d time-agent

    - name: Download PHPUnit
      run: |
        wget -q -O phpunit.phar https://phar.phpunit.de/phpunit-10.phar
        chmod +x phpunit.phar

    - name: Execute tests via PHPUnit
      run: php phpunit.phar --testdox
