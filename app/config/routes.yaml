# Load controllers from src/Controller/ with PHP 8 attributes
controllers:
    resource: ../src/Controller/
    type: attribute

dashboard:
    path: /
    controller: App\Controller\DashboardController::index

logs:
    path: /logs
    controller: App\Controller\LogController::index

api_config:
    path: /api/config
    controller: App\Controller\ApiController::config
    methods: [GET]

api_save_hosts:
    path: /api/config/hosts
    controller: App\Controller\ApiController::saveHosts
    methods: [POST]

api_save_app:
    path: /api/config/app
    controller: App\Controller\ApiController::saveApp
    methods: [POST]
