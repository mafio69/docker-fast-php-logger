services:
  # GŁÓWNA APLIKACJA - PHP + Nginx
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devbox
    ports:
      - "8082:80"
    volumes:
      - ./logs:/var/www/html/logs
      - ./data:/var/www/html/data
      - ./app:/var/www/html/app:ro
    environment:
      - APP_ENV=development
      - LOG_DIR=/var/www/html/logs
      - DB_PATH=/var/www/html/data/devbox.sqlite
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=devbox
      - DB_USERNAME=devbox
      - DB_PASSWORD=devbox
    networks:
      - devbox-net
    restart: unless-stopped
    depends_on:
      - mysql

  # MySQL 8
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=devbox
      - MYSQL_USER=devbox
      - MYSQL_PASSWORD=devbox
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - devbox-net
    restart: unless-stopped
    ports:
      - "3307:3306"

  # PORTAINER - zarządzanie Docker
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9090:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - devbox-net
    restart: unless-stopped

  # ADMINER - bazy danych (SQLite/MySQL)
  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
      - ADMINER_DESIGN=pepa-linha-dark
    networks:
      - devbox-net
    restart: unless-stopped
    depends_on:
      - mysql

  # MAILPIT - testowy SMTP
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    volumes:
      - mailpit_data:/data
    networks:
      - devbox-net
    restart: unless-stopped

  # REVERSE PROXY - wszystkie domeny .local na porcie 80
  proxy:
    image: nginx:alpine
    container_name: proxy
    network_mode: host
    volumes:
      - ./docker/proxy.conf:/etc/nginx/nginx.conf:ro
      - proxy_run:/run/nginx
    restart: unless-stopped

volumes:
  mysql_data:
  portainer_data:
  mailpit_data:
  proxy_run:

networks:
  devbox-net:
    driver: bridge
