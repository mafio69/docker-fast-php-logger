worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # DevBox - główna aplikacja
    server {
        listen 80;
        server_name app.local;

        location / {
            proxy_pass http://php:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Logger
    server {
        listen 80;
        server_name logs.local;

        location / {
            proxy_pass http://php:80;
            proxy_set_header Host $host;
        }
    }

    # Portainer
    server {
        listen 80;
        server_name portainer.local;

        location / {
            proxy_pass http://portainer:9000;
            proxy_set_header Host $host;
        }
    }

    # Mailpit
    server {
        listen 80;
        server_name mail.local;

        location / {
            proxy_pass http://mailpit:8025;
            proxy_set_header Host $host;
        }
    }

    # Adminer
    server {
        listen 80;
        server_name adminer.local pma.local;

        location / {
            proxy_pass http://adminer:8080;
            proxy_set_header Host $host;
        }
    }

    # MCP Server
    server {
        listen 80;
        server_name mcp.local;

        location / {
            proxy_pass http://php:8000;
            proxy_set_header Host $host;
        }
    }

    # Default - przekieruj na devbox
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://php:80;
            proxy_set_header Host $host;
        }
    }
}
