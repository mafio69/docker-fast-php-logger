<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Viewer // DataTable</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --green: #00ff41;
            --green-dim: #008f11;
            --green-dark: #003b00;
            --red: #ff0040;
            --yellow: #ffee00;
            --cyan: #00ffff;
            --gray: #666;
            --white: #e0e0e0;
        }
        body {
            background: var(--bg);
            color: var(--green);
            font-family: 'JetBrains Mono', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 1000;
        }
        header {
            border-bottom: 1px solid var(--green-dim);
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 20px; font-weight: bold; letter-spacing: 3px; }
        .stats { display: flex; gap: 20px; font-size: 11px; color: var(--gray); }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--green-dark);
            background: rgba(0, 59, 0, 0.1);
        }
        .control-group { display: flex; align-items: center; gap: 8px; }
        .control-group label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--green-dim);
        }
        input, select {
            background: var(--bg);
            border: 1px solid var(--green-dim);
            color: var(--green);
            padding: 6px 12px;
            font-family: inherit;
            font-size: 12px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: var(--green);
            box-shadow: 0 0 8px var(--green-dim);
        }
        input::placeholder { color: var(--green-dark); }
        
        /* Table */
        .table-container {
            overflow-x: auto;
            border: 1px solid var(--green-dark);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        th {
            background: var(--green-dark);
            color: var(--green);
            padding: 12px 15px;
            text-align: left;
            font-weight: normal;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        th:hover {
            background: var(--green-dim);
        }
        th.sortable::after {
            content: ' ⇅';
            color: var(--gray);
            font-size: 10px;
        }
        th.sort-asc::after { content: ' ▲'; color: var(--green); }
        th.sort-desc::after { content: ' ▼'; color: var(--green); }
        td {
            padding: 10px 15px;
            border-bottom: 1px solid var(--green-dark);
        }
        tr:hover td {
            background: rgba(0, 143, 17, 0.1);
        }
        tr:nth-child(even) {
            background: rgba(0, 59, 0, 0.05);
        }
        
        /* Status badges */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid;
        }
        .badge.active { color: var(--green); border-color: var(--green); }
        .badge.draft { color: var(--yellow); border-color: var(--yellow); }
        .badge.archived { color: var(--gray); border-color: var(--gray); }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 15px;
            border-top: 1px solid var(--green-dark);
        }
        .page-info { color: var(--gray); font-size: 11px; }
        .page-buttons {
            display: flex;
            gap: 5px;
        }
        .page-btn {
            background: transparent;
            border: 1px solid var(--green-dark);
            color: var(--green);
            padding: 5px 12px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
        }
        .page-btn:hover { border-color: var(--green); }
        .page-btn.active {
            background: var(--green-dark);
            border-color: var(--green);
        }
        .page-btn:disabled {
            color: var(--gray);
            border-color: var(--gray);
            cursor: not-allowed;
        }
        
        /* Empty state */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--gray);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--green-dark); border: 1px solid var(--green-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }
    </style>
</head>
<body>
    <header>
        <div class="logo">MDVIEWER://DATATABLE</div>
        <div class="stats">
            <span>TOTAL: <span id="total-count">0</span></span>
            <span>DISPLAYED: <span id="displayed-count">0</span></span>
            <span>FILTERED: <span id="filtered-count">0</span></span>
        </div>
    </header>
    
    <div class="controls">
        <div class="control-group">
            <label>Search</label>
            <input type="text" id="search" placeholder="type to search...">
        </div>
        <div class="control-group">
            <label>Status</label>
            <select id="filter-status">
                <option value="">ALL</option>
                <option value="active">ACTIVE</option>
                <option value="draft">DRAFT</option>
                <option value="archived">ARCHIVED</option>
            </select>
        </div>
        <div class="control-group">
            <label>Category</label>
            <select id="filter-category">
                <option value="">ALL</option>
                <option value="docs">DOCS</option>
                <option value="api">API</option>
                <option value="config">CONFIG</option>
            </select>
        </div>
        <div class="control-group">
            <label>Per Page</label>
            <select id="per-page">
                <option value="10">10</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
    </div>
    
    <div class="table-container">
        <table id="data-table">
            <thead>
                <tr>
                    <th class="sortable" data-col="id">ID</th>
                    <th class="sortable" data-col="title">TITLE</th>
                    <th class="sortable" data-col="status">STATUS</th>
                    <th class="sortable" data-col="category">CATEGORY</th>
                    <th class="sortable" data-col="modified">MODIFIED</th>
                    <th class="sortable" data-col="size">SIZE</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <!-- Data inserted via JS -->
            </tbody>
        </table>
        <div class="empty" id="empty-state" style="display: none;">
            NO RECORDS FOUND
        </div>
    </div>
    
    <div class="pagination">
        <div class="page-info">
            SHOWING <span id="page-start">0</span> TO <span id="page-end">0</span> OF <span id="page-total">0</span>
        </div>
        <div class="page-buttons" id="pagination">
            <!-- Pagination buttons -->
        </div>
    </div>
    
    <script>
        // Mock data
        const generateData = () => {
            const statuses = ['active', 'draft', 'archived'];
            const categories = ['docs', 'api', 'config'];
            const data = [];
            for (let i = 1; i <= 150; i++) {
                data.push({
                    id: String(i).padStart(3, '0'),
                    title: `document_${String(i).padStart(3, '0')}.md`,
                    status: statuses[Math.floor(Math.random() * statuses.length)],
                    category: categories[Math.floor(Math.random() * categories.length)],
                    modified: new Date(Date.now() - Math.random() * 86400000 * 30).toISOString().split('T')[0],
                    size: Math.floor(Math.random() * 50 + 1) + ' KB'
                });
            }
            return data;
        };
        
        let allData = generateData();
        let filteredData = [...allData];
        let currentPage = 1;
        let perPage = 25;
        let sortCol = 'id';
        let sortDir = 'asc';
        
        const tableBody = document.getElementById('table-body');
        const searchInput = document.getElementById('search');
        const statusFilter = document.getElementById('filter-status');
        const categoryFilter = document.getElementById('filter-category');
        const perPageSelect = document.getElementById('per-page');
        
        function updateStats() {
            document.getElementById('total-count').textContent = allData.length;
            document.getElementById('displayed-count').textContent = filteredData.length;
            document.getElementById('filtered-count').textContent = allData.length - filteredData.length;
        }
        
        function sortData() {
            filteredData.sort((a, b) => {
                let valA = a[sortCol];
                let valB = b[sortCol];
                
                if (sortCol === 'size') {
                    valA = parseInt(valA);
                    valB = parseInt(valB);
                }
                
                if (valA < valB) return sortDir === 'asc' ? -1 : 1;
                if (valA > valB) return sortDir === 'asc' ? 1 : -1;
                return 0;
            });
        }
        
        function filterData() {
            const search = searchInput.value.toLowerCase();
            const status = statusFilter.value;
            const category = categoryFilter.value;
            
            filteredData = allData.filter(item => {
                const matchesSearch = !search || 
                    item.title.toLowerCase().includes(search) ||
                    item.id.includes(search);
                const matchesStatus = !status || item.status === status;
                const matchesCategory = !category || item.category === category;
                
                return matchesSearch && matchesStatus && matchesCategory;
            });
            
            sortData();
            currentPage = 1;
            renderTable();
            updateStats();
        }
        
        function renderTable() {
            const start = (currentPage - 1) * perPage;
            const end = Math.min(start + perPage, filteredData.length);
            const pageData = filteredData.slice(start, end);
            
            if (pageData.length === 0) {
                tableBody.innerHTML = '';
                document.getElementById('empty-state').style.display = 'block';
            } else {
                document.getElementById('empty-state').style.display = 'none';
                tableBody.innerHTML = pageData.map(item => `
                    <tr>
                        <td>#${item.id}</td>
                        <td>${item.title}</td>
                        <td><span class="badge ${item.status}">${item.status}</span></td>
                        <td>${item.category.toUpperCase()}</td>
                        <td>${item.modified}</td>
                        <td>${item.size}</td>
                        <td><button class="page-btn" onclick="viewDoc('${item.id}')">VIEW</button></td>
                    </tr>
                `).join('');
            }
            
            document.getElementById('page-start').textContent = filteredData.length ? start + 1 : 0;
            document.getElementById('page-end').textContent = end;
            document.getElementById('page-total').textContent = filteredData.length;
            
            renderPagination();
        }
        
        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / perPage);
            let html = `
                <button class="page-btn" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>|<</button>
                <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><</button>
            `;
            
            for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            html += `
                <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>></button>
                <button class="page-btn" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>|></button>
            `;
            
            document.getElementById('pagination').innerHTML = html;
        }
        
        window.goToPage = (page) => {
            const totalPages = Math.ceil(filteredData.length / perPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
            }
        };
        
        window.viewDoc = (id) => {
            console.log('View doc:', id);
        };
        
        // Sort handlers
        document.querySelectorAll('th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const col = th.dataset.col;
                if (sortCol === col) {
                    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                } else {
                    sortCol = col;
                    sortDir = 'asc';
                }
                
                document.querySelectorAll('th').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
                th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
                
                sortData();
                renderTable();
            });
        });
        
        // Filter handlers
        searchInput.addEventListener('input', filterData);
        statusFilter.addEventListener('change', filterData);
        categoryFilter.addEventListener('change', filterData);
        perPageSelect.addEventListener('change', (e) => {
            perPage = parseInt(e.target.value);
            currentPage = 1;
            renderTable();
        });
        
        // Init
        filterData();
    </script>
</body>
</html>
