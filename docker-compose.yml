services:
  # GŁÓWNA APLIKACJA - PHP + Nginx (Symfony)
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devbox
    env_file:
      - .env
    ports:
      - "${PHP_PORT:-8082}:80"
    volumes:
      - .:/var/www/html
      - ~/.ssh:/var/www/.ssh:ro
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
      - LOG_DIR=/var/www/html/logs
      - DB_PATH=/var/www/html/data/devbox.sqlite
      - DB_HOST=mysql
      # Variables below will be loaded from .env file implicitly but are explicit here for fallback or override
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-devbox}
      - DB_USERNAME=${DB_USERNAME:-devbox}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
    networks:
      - devbox-net
    restart: unless-stopped
    depends_on:
      - mysql

  # MySQL 8
  mysql:
    image: mysql:8.0
    container_name: mysql
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
      - MYSQL_DATABASE=${DB_DATABASE:-devbox}
      - MYSQL_USER=${DB_USERNAME:-devbox}
      - MYSQL_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - devbox-net
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3307}:3306"

  # PORTAINER - zarządzanie Docker
  portainer:
    image: portainer/portainer-ce@sha256:8d2f5c9fbc5b8490fb3a12efadbad74978e22991911e1db611d8a45871775112
    container_name: portainer
    ports:
      - "${PORTAINER_PORT:-9090}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - devbox-net
    restart: unless-stopped

  # ADMINER - bazy danych (SQLite/MySQL)
  adminer:
    image: adminer@sha256:cc64d253db4f016cbcff2ff2f01e60ed07e74f38b4398f84d3c4fae4b5ce0e07
    container_name: adminer
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
      - ADMINER_DESIGN=pepa-linha-dark
    networks:
      - devbox-net
    restart: unless-stopped
    depends_on:
      - mysql

  # MAILPIT - testowy SMTP
  mailpit:
    image: axllent/mailpit@sha256:3bd7c2f2696deb35a4780d152b404dceec99cb041b942c0877b3b22384714f85
    container_name: mailpit
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"   # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP
    volumes:
      - mailpit_data:/data
    networks:
      - devbox-net
    restart: unless-stopped

  # MCP SERVER - Panel Administracyjny
  mcp-server:
    image: php:8.2-cli
    container_name: mcp-server
    command: php -S 0.0.0.0:8000 -t /var/www/html/vendor/mafio69/enhanced-php-mcp-server/public
    ports:
      - "${MCP_PORT:-8000}:8000"
    volumes:
      - .:/var/www/html
    networks:
      - devbox-net
    restart: unless-stopped

  # PLAYWRIGHT - Serwer do testów E2E
  playwright:
    image: mcr.microsoft.com/playwright:v1.44.0-jammy
    container_name: playwright
    command: tail -f /dev/null
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - devbox-net
    depends_on:
      - php
    restart: "no" # Testy odpalamy na życzenie, lub serwer może działać jako node

  # REVERSE PROXY - wszystkie domeny .local na porcie 80
  proxy:
    image: nginx:alpine
    container_name: proxy
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./docker/proxy.conf:/etc/nginx/nginx.conf:ro
      - proxy_run:/run/nginx
    networks:
      - devbox-net
    restart: unless-stopped
    depends_on:
      - php
      - portainer
      - adminer
      - mailpit

volumes:
  mysql_data:
  portainer_data:
  mailpit_data:
  proxy_run:

networks:
  devbox-net:
    driver: bridge
