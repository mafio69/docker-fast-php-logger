services:
  # GŁÓWNA APLIKACJA - PHP + Nginx (Symfony)
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devbox
    ports:
      - "${PHP_PORT:-8082}:80"
    volumes:
      - ./logs:/var/www/html/logs
      - ./data:/var/www/html/data
      - ./var:/var/www/html/var
      - ./public:/var/www/html/public:ro
      - ./config:/var/www/html/config:ro
      - ./src:/var/www/html/src:ro
      - ./templates:/var/www/html/templates:ro
      - ./vendor:/var/www/html/vendor:ro
      - ./composer.json:/var/www/html/composer.json:ro
      - ./composer.lock:/var/www/html/composer.lock:ro
      - ~/.ssh:/var/www/.ssh
      - ./.env.dev:/var/www/html/.env.dev
    environment:
      - APP_ENV=dev
      - APP_DEBUG=1
      - LOG_DIR=/var/www/html/logs
      - DB_PATH=/var/www/html/data/devbox.sqlite
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - devbox-net
    restart: unless-stopped
    depends_on:
      - mysql

  # MySQL 8
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - devbox-net
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3307}:3306"

  # PORTAINER - zarządzanie Docker
  portainer:
    image: portainer/portainer-ce@sha256:8d2f5c9fbc5b8490fb3a12efadbad74978e22991911e1db611d8a45871775112
    container_name: portainer
    ports:
      - "${PORTAINER_PORT:-9090}:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - devbox-net
    restart: unless-stopped

  # ADMINER - bazy danych (SQLite/MySQL)
  adminer:
    image: adminer@sha256:cc64d253db4f016cbcff2ff2f01e60ed07e74f38b4398f84d3c4fae4b5ce0e07
    container_name: adminer
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=mysql
      - ADMINER_DESIGN=pepa-linha-dark
    networks:
      - devbox-net
    restart: unless-stopped
    depends_on:
      - mysql

  # MAILPIT - testowy SMTP
  mailpit:
    image: axllent/mailpit@sha256:3bd7c2f2696deb35a4780d152b404dceec99cb041b942c0877b3b22384714f85
    container_name: mailpit
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"   # Web UI
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP
    volumes:
      - mailpit_data:/data
    networks:
      - devbox-net
    restart: unless-stopped

  # REVERSE PROXY - wszystkie domeny .local na porcie 80
  proxy:
    image: nginx:alpine
    container_name: proxy
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./docker/proxy.conf:/etc/nginx/nginx.conf:ro
      - proxy_run:/run/nginx
    networks:
      - devbox-net
    restart: unless-stopped
    depends_on:
      - php
      - portainer
      - adminer
      - mailpit

volumes:
  mysql_data:
  portainer_data:
  mailpit_data:
  proxy_run:

networks:
  devbox-net:
    driver: bridge
