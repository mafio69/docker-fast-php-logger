# yaml-language-server: $schema=../../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    # MdViewer: Bind interface to concrete implementation
    # Swap with DatabaseDataProvider or ApiDataProvider in production
    App\Service\MdViewer\DataProviderInterface:
        class: App\Service\MdViewer\MockDataProvider
