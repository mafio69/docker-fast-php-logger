name: Update Log Viewer

on:
  schedule:
    # Uruchom codziennie o 2:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Pozwala na ręczne uruchomienie

permissions:
  contents: write

jobs:
  update-log-viewer:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
    
    - name: Get current log-viewer version
      id: current-version
      run: |
        CURRENT_VERSION=$(composer show mafio69/log-viewer --no-ansi | grep 'versions' | grep -oE '[^ ]+$')
        echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
        echo "Current log-viewer version: $CURRENT_VERSION"
    
    - name: Update log-viewer dependency
      run: composer update mafio69/log-viewer --no-interaction --no-ansi
    
    - name: Get new log-viewer version
      id: new-version
      run: |
        NEW_VERSION=$(composer show mafio69/log-viewer --no-ansi | grep 'versions' | grep -oE '[^ ]+$')
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "New log-viewer version: $NEW_VERSION"
    
    - name: Check if version changed
      id: check-changes
      run: |
        if [ "${{ steps.current-version.outputs.version }}" != "${{ steps.new-version.outputs.version }}" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Log viewer version changed from ${{ steps.current-version.outputs.version }} to ${{ steps.new-version.outputs.version }}"
        else
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No changes in log viewer version"
        fi
    
    - name: Clear Symfony cache
      if: steps.check-changes.outputs.changed == 'true'
      run: php bin/console cache:clear --no-warmup || true
    
    - name: Commit and push changes
      if: steps.check-changes.outputs.changed == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add composer.json composer.lock
        git commit -m "Update mafio69/log-viewer to ${{ steps.new-version.outputs.version }}"
        git push