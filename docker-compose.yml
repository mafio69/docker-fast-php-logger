services:
  # GŁÓWNA APLIKACJA
  devbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devbox
    ports:
      - "8794:80"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./app:/var/www/html/app:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/tmp/.docker.xauth:ro
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - XAUTHORITY=/tmp/.docker.xauth
      - LOG_DIR=/app/logs
      - DB_PATH=/app/data/devbox.sqlite
    restart: unless-stopped

  # LOG VIEWER (osobny, na porcie 8795)
  logviewer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logviewer
    ports:
      - "8795:80"
    volumes:
      - ./logs:/var/www/html/logs:ro
      - ./app:/var/www/html/app:ro
    environment:
      - VIRTUAL_HOST=logviewer.local
    restart: unless-stopped
    command: ["nginx", "-g", "daemon off;"]

  # PORTAINER - zarządzanie Docker
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

  # ADMINER - bazy danych (SQLite/MySQL)
  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=sqlite
      - ADMINER_DESIGN=pepa-linha-dark
    restart: unless-stopped

  # MAILPIT - testowy SMTP
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    volumes:
      - mailpit_data:/data
    restart: unless-stopped

volumes:
  portainer_data:
  mailpit_data:
